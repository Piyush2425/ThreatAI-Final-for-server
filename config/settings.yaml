app:
  name: Threat-AI
  version: 0.1.0
  debug: false

data:
  raw_path: data/raw/threat_actor_profiles.json
  canonical_path: data/canonical/actors.json
  chunks_path: data/derived/semantic_chunks.jsonl
  schema_path: data/derived/chunk_schema.json

chunking:
  chunk_size: 800
  chunk_overlap: 128
  min_chunk_length: 50
  entity_level: true  # Use entity-level chunking (one chunk per actor)

embeddings:
  model: sentence-transformers/all-MiniLM-L6-v2
  embedding_dim: 384
  batch_size: 32

vector_store:
  type: chroma
  persist_directory: data/chroma_db
  collection_name: threat_actors

retrieval:
  top_k: 5
  similarity_threshold: 0.3  # Lowered from 0.6 for better recall
  bm25_weight: 0.3  # Weight for BM25 keyword matching
  vector_weight: 0.7  # Weight for vector similarity
  use_hybrid: true  # Enable hybrid BM25 + vector search
  use_metadata_filter: true  # Enable metadata filtering for specific actors

agent:
  temperature: 0.3
  max_tokens: 1024
  confidence_threshold: 0.7

ollama:
  enabled: true
  model: llama3.2:3b
  host: http://localhost:11434
  timeout: 120
  temperature: 0.3
  max_tokens: 512

evaluation:
  enable_audit_trail: true
  enable_confidence_scoring: true
